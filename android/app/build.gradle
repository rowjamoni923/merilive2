plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
}

android {
    namespace 'com.merilive.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.merilive.app"
        minSdk 24
        targetSdk 34
        versionCode 40
        versionName "1.0.1"
        multiDexEnabled true
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding true
    }

    packagingOptions {
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/NOTICE'
    }
}

repositories {
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    // ===== GPUPixel (Pkg200 — Professional beauty filter, Apache 2.0) =====
    // Native C++ skin smoothing, whitening, MarsFace 3D landmarks,
    // face reshape (thin face / big eye), lipstick, blusher, LUT filters.
    implementation(name: 'gpupixel-release', ext: 'aar')
    // MultiDex (safety for older devices / large method count)
    implementation 'androidx.multidex:multidex:2.0.1'
    // AndroidX Core
    implementation 'androidx.core:core:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.activity:activity:1.8.2'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.lifecycle:lifecycle-runtime:2.7.0'
    implementation 'androidx.webkit:webkit:1.10.0'

    // Material Design
    implementation 'com.google.android.material:material:1.11.0'

    // Splash Screen
    implementation 'androidx.core:core-splashscreen:1.0.1'

    // Pkg210 — Biometric App Lock (fingerprint / face / device credential).
    implementation 'androidx.biometric:biometric:1.2.0-alpha05'

    // Pkg224 / M19 — Google Play In-App Updates (flexible + immediate).
    implementation 'com.google.android.play:app-update:2.1.0'
    implementation 'com.google.android.play:app-update-ktx:2.1.0'
    // Pkg233 / M27 — In-app review API
    implementation 'com.google.android.play:review:2.0.1'
    implementation 'com.google.android.play:review-ktx:2.0.1'
    // Pkg236 — Play Integrity API
    implementation 'com.google.android.play:integrity:1.4.0'

    // Firebase
    implementation platform('com.google.firebase:firebase-bom:32.7.3')
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'com.google.firebase:firebase-auth'

    // Google Play Billing
    implementation 'com.android.billingclient:billing:6.2.0'

    // Google Play Install Referrer (Pkg62 — deferred deep links from Play Store)
    implementation 'com.android.installreferrer:installreferrer:2.2'

    // Google Play Services
    implementation 'com.google.android.gms:play-services-auth:21.0.0'
    implementation 'com.google.android.gms:play-services-location:21.1.0'

    // Capacitor
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')

    // Image Loading
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    annotationProcessor 'com.github.bumptech.glide:compiler:4.16.0'

    // Security
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'

    // Work Manager
    implementation 'androidx.work:work-runtime:2.9.0'

    // ===== CameraX (Native Camera Pipeline) =====
    // Used by NativeCameraPlugin for Live + Private Call.
    // Replaces browser getUserMedia for professional-grade camera control.
    def cameraxVersion = '1.4.2'
    implementation "androidx.camera:camera-core:${cameraxVersion}"
    implementation "androidx.camera:camera-camera2:${cameraxVersion}"
    implementation "androidx.camera:camera-lifecycle:${cameraxVersion}"
    implementation "androidx.camera:camera-view:${cameraxVersion}"
    implementation "androidx.camera:camera-video:${cameraxVersion}"

    // ===== Kotlin + Coroutines (LiveKit interop) =====
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1'

    // ===== LiveKit Android SDK (Native WebRTC) =====
    // Publishes camera + mic as native WebRTC tracks for Live + Private Call.
    implementation 'io.livekit:livekit-android:2.7.0'

    // ===== MediaPipe Tasks Vision (Step 36 — virtual background / blur) =====
    // On-device person-segmentation for VirtualBackgroundProcessor. Runs the
    // SelfieSegmenter (UINT8 mask, 256x256) on a background thread; per-frame
    // overhead is ~3 ms on a Snapdragon 8 Gen 2.
    implementation 'com.google.mediapipe:tasks-vision:0.10.14'
}
