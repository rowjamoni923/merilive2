name: merilive_app
description: "A new Flutter project for MeriLive"
publish_to: 'none'

version: 8.1.0+35

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.3.6
  shimmer: ^3.0.0

  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.0.0
  flutter_callkit_incoming: ^2.0.0
  livekit_client: ^2.0.0
  provider: ^6.1.1
  lucide_icons: ^0.257.0 # for matching web icons
  device_info_plus: ^10.1.0
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  audioplayers: ^6.0.0
  lottie: ^3.1.0
  video_player: ^2.8.2 
  visibility_detector: ^0.4.0+2
  marquee: ^2.2.3
  image_picker: ^1.0.7
  in_app_purchase: ^3.1.11
  url_launcher: ^6.2.4
  cached_network_image: ^3.3.1
  fl_chart: ^0.66.0
  intl: ^0.19.0
  google_fonts: ^8.0.2
  flutter_svga: ^0.0.5
  animate_do: ^3.3.4
  camera: ^0.11.0+1
  google_mlkit_face_detection: ^0.13.2
  video_thumbnail: ^0.5.3
  share_plus: ^12.0.2
  firebase_core: ^2.32.0
  record: ^6.2.0
  path_provider: ^2.1.5
  path: ^1.9.1
  pinput: ^6.0.2
  flutter_svg: 2.0.10+1
  image_cropper: ^12.2.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/3d/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
