name: Visual Regression

# Pixel-diff guard. Catches contrast/layout regressions on public surfaces.
# Update baselines locally with `npm run test:visual:update` and commit
# the snapshot changes (in tests/visual/__screenshots__/) with the PR.

on:
  pull_request:
    branches: [main, master]
    paths:
      - "src/**"
      - "tailwind.config.ts"
      - "tests/visual/**"
      - "playwright.config.ts"
      - "package.json"
      - ".github/workflows/visual-regression.yml"
  push:
    branches: [main, master]

concurrency:
  group: visual-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual:
    name: Playwright snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual tests
        run: npx playwright test
        env:
          CI: "true"

      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
