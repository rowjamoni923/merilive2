<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Native App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Ultra-fast resource discovery (Pkg-Phase13 cold-launch warmup) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://ayjdlvuurscxucatbbah.supabase.co" crossorigin />
    <link rel="preconnect" href="https://ayjdlvuurscxucatbbah.storage.supabase.co" crossorigin />
    <link rel="preconnect" href="https://livekit.merilive.xyz" crossorigin />
    <link rel="dns-prefetch" href="https://ayjdlvuurscxucatbbah.supabase.co" />
    <link rel="dns-prefetch" href="https://ayjdlvuurscxucatbbah.storage.supabase.co" />
    <link rel="dns-prefetch" href="https://livekit.merilive.xyz" />
    <link rel="dns-prefetch" href="https://fcm.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Critical Fonts — non-blocking load (preload + media swap). System font renders instantly, custom font swaps in. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@500;600;700;800&family=Cinzel:wght@600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@500;600;700;800&family=Cinzel:wght@600;700;800&display=swap"></noscript>

    <!-- SEO and App Info -->
    <title>MeriLive - Professional Live Streaming & Virtual Gifting</title>
    <meta name="description" content="MeriLive: The professional choice for high-quality live streaming, video calls, and instant virtual gifting. Zero-latency interaction and premium animations.">
    <meta name="keywords" content="live streaming, video call, virtual gifts, professional streaming app" />
    <meta name="author" content="MeriLive" />
    <link rel="canonical" href="https://merilive.top/" />
    
    <meta name="theme-color" content="#FFFBF2" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Howler.js for SVGA Audio Support - Deferred -->
    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.core.min.js" defer></script>
    
    <style>
      html { overflow-x: hidden; -webkit-overflow-scrolling: touch; }
      body { margin: 0; padding: 0; background-color: #FFFBF2; color: #1f2937; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }

      #root { min-height: 100vh; min-height: 100dvh; background-color: #FFFBF2; position: relative; z-index: 1; }

      /* Pkg504: dark-route boot bg */
      html[data-boot-theme="dark"],
      html[data-boot-theme="dark"] body,
      html[data-boot-theme="dark"] #root { background-color: #050208 !important; color: #ffffff; }

      /* ===== Boot shell: STATIC painted app chrome before React mounts.
         NO shimmer, NO pulse, NO spinner — but full app silhouette so no
         blank/white screen is ever perceived. ===== */
      .boot-shell { position: fixed; inset: 0; display: flex; flex-direction: column; pointer-events: none; z-index: 2147482000; background-color: #FFFBF2; }
      .boot-shell .bs-top { height: 56px; background: #F3EBDC; border-bottom: 1px solid #E8DFCC; display: flex; align-items: center; padding: 0 16px; gap: 12px; }
      .boot-shell .bs-dot { width: 32px; height: 32px; border-radius: 999px; background: #E2D6BE; }
      .boot-shell .bs-bar { height: 14px; border-radius: 7px; background: #E2D6BE; flex: 1; max-width: 160px; }
      .boot-shell .bs-body { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow: hidden; }
      .boot-shell .bs-card { height: 72px; border-radius: 16px; background: #F0E7D2; }
      .boot-shell .bs-card.lg { height: 120px; }
      .boot-shell .bs-bottom { height: 64px; background: #F3EBDC; border-top: 1px solid #E8DFCC; display: flex; align-items: center; justify-content: space-around; padding: 0 8px; }
      .boot-shell .bs-tab { width: 28px; height: 28px; border-radius: 8px; background: #E2D6BE; }

      html[data-boot-theme="dark"] .boot-shell { background-color: #050208; }
      html[data-boot-theme="dark"] .boot-shell .bs-top,
      html[data-boot-theme="dark"] .boot-shell .bs-bottom { background: #0d0a14; border-color: #1a1422; }
      html[data-boot-theme="dark"] .boot-shell .bs-dot,
      html[data-boot-theme="dark"] .boot-shell .bs-bar,
      html[data-boot-theme="dark"] .boot-shell .bs-card,
      html[data-boot-theme="dark"] .boot-shell .bs-tab { background: #1a1422; }

      /* Hide boot shell once React mounts. */
      body.app-booted .boot-shell { display: none !important; }

      html::-webkit-scrollbar, body::-webkit-scrollbar { width: 0; height: 0; display: none; }
      html, body { scrollbar-width: none; -ms-overflow-style: none; }
    </style>
    <script>
      // Pkg504: pick boot theme from URL before any paint.
      // Dark only for true full-screen room routes (live room, party room,
      // go-live, video calls). List/lobby pages stay light.
      (function () {
        try {
          var p = (location.pathname || '/').toLowerCase();
          var dark =
            /^\/live\/[^\/]+/.test(p) ||
            /^\/live-feed(\/|$)/.test(p) ||
            /^\/party\//.test(p) ||
            p === '/go-live' ||
            /^\/call\//.test(p) ||
            /^\/(active-call|incoming-call|outgoing-call)(\/|$)/.test(p) ||
            /^\/stream\//.test(p);
          if (dark) document.documentElement.setAttribute('data-boot-theme', 'dark');
        } catch (_) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div class="boot-shell" aria-hidden="true">
      <div class="bs-top"><div class="bs-dot"></div><div class="bs-bar"></div></div>
      <div class="bs-body">
        <div class="bs-card lg"></div>
        <div class="bs-card"></div>
        <div class="bs-card"></div>
        <div class="bs-card"></div>
      </div>
      <div class="bs-bottom"><div class="bs-tab"></div><div class="bs-tab"></div><div class="bs-tab"></div><div class="bs-tab"></div><div class="bs-tab"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
