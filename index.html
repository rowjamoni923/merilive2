    <!-- Minimal native optimizations -->
    <script>
      (function () {
        const ZOOMABLE_ROUTES = [
          '/admin',
          '/auth',
          '/link',
          '/smart-link',
          '/create-agency',
          '/join-agency',
          '/become-sub-agent',
          '/agency-signup',
          '/policies',
          '/policies-benefits',
          '/about',
          '/agency-policy',
          '/helper-policy',
          '/privacy-policy',
          '/terms',
          '/payroll-helper-guide',
          '/google-library-order-rules',
          '/reset-password',
          '/auth/callback',
          '/~oauth'
        ];

        const viewport = document.querySelector('meta[name="viewport"]');
        const root = document.getElementById('root');
        const defaultViewport = viewport?.getAttribute('content') || 'width=device-width, initial-scale=1.0, viewport-fit=cover';
        const zoomableViewport = 'width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=10, user-scalable=yes';

        const isZoomableRoute = (pathname) =>
          ZOOMABLE_ROUTES.some((route) => pathname === route || pathname.startsWith(route + '/'));

        const applyBrowserInteractionMode = () => {
          const allowBrowserZoom = isZoomableRoute(window.location.pathname);

          if (viewport) {
            viewport.setAttribute('content', allowBrowserZoom ? zoomableViewport : defaultViewport);
          }

          document.documentElement.style.overflowY = allowBrowserZoom ? 'auto' : '';
          document.body.style.overflowY = allowBrowserZoom ? 'auto' : '';
          document.documentElement.style.touchAction = allowBrowserZoom ? 'auto' : '';
          document.body.style.touchAction = allowBrowserZoom ? 'auto' : '';

          if (root) {
            root.style.overflow = allowBrowserZoom ? 'visible' : '';
            root.style.height = allowBrowserZoom ? 'auto' : '';
          }
        };

        const originalPushState = history.pushState;
        history.pushState = function () {
          const result = originalPushState.apply(this, arguments);
          setTimeout(applyBrowserInteractionMode, 0);
          return result;
        };

        const originalReplaceState = history.replaceState;
        history.replaceState = function () {
          const result = originalReplaceState.apply(this, arguments);
          setTimeout(applyBrowserInteractionMode, 0);
          return result;
        };

        window.addEventListener('popstate', applyBrowserInteractionMode);
        window.addEventListener('hashchange', applyBrowserInteractionMode);
        applyBrowserInteractionMode();

        // Prevent context menu on images only
        document.addEventListener('contextmenu', function(e) {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
            return;
          }
          e.preventDefault();
        });
      })();
    </script>
