<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Native App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Ultra-fast resource discovery (Pkg-Phase13 cold-launch warmup) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://ayjdlvuurscxucatbbah.supabase.co" crossorigin />
    <link rel="preconnect" href="https://ayjdlvuurscxucatbbah.storage.supabase.co" crossorigin />
    <link rel="preconnect" href="https://livekit.merilive.xyz" crossorigin />
    <link rel="dns-prefetch" href="https://ayjdlvuurscxucatbbah.supabase.co" />
    <link rel="dns-prefetch" href="https://ayjdlvuurscxucatbbah.storage.supabase.co" />
    <link rel="dns-prefetch" href="https://livekit.merilive.xyz" />
    <link rel="dns-prefetch" href="https://fcm.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Critical Fonts — non-blocking load (preload + media swap). System font renders instantly, custom font swaps in. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@500;600;700;800&family=Cinzel:wght@600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@500;600;700;800&family=Cinzel:wght@600;700;800&display=swap"></noscript>

    <!-- SEO and App Info -->
    <title>MeriLive - Professional Live Streaming & Virtual Gifting</title>
    <meta name="description" content="MeriLive: The professional choice for high-quality live streaming, video calls, and instant virtual gifting. Zero-latency interaction and premium animations.">
    <meta name="keywords" content="live streaming, video call, virtual gifts, professional streaming app" />
    <meta name="author" content="MeriLive" />
    <link rel="canonical" href="https://merilive.top/" />
    
    <meta name="theme-color" content="#F8FAFC" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Howler.js for SVGA Audio Support - Deferred -->
    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.core.min.js" defer></script>
    
    <style>
      html { overflow-x: hidden; -webkit-overflow-scrolling: touch; }
      body { margin: 0; padding: 0; background-color: #F8FAFC; color: #1f2937; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }

      #root { min-height: 100vh; min-height: 100dvh; background-color: #F8FAFC; position: relative; z-index: 1; }

      /* Pkg504: dark-route boot bg */
      html[data-boot-theme="dark"],
      html[data-boot-theme="dark"] body,
      html[data-boot-theme="dark"] #root { background-color: #050208 !important; color: #ffffff; }

      /* ===== Boot shell: real-looking static screen before React mounts.
         Not a skeleton, not a loader: it resembles the actual first screen. ===== */
      .boot-shell { position: fixed; inset: 0; display: flex; flex-direction: column; pointer-events: none; z-index: 2147482000; background: linear-gradient(135deg, #0f0c29 0%, #302b63 42%, #24243e 72%, #0f0c29 100%); color: #fff; overflow: hidden; }
      .boot-shell::before { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,.08), rgba(0,0,0,.48)); }
      .boot-shell .bs-auth { position: relative; z-index: 1; min-height: 100%; display: flex; flex-direction: column; justify-content: flex-end; gap: 8px; padding: 16px 20px 32px; box-sizing: border-box; }
      .boot-shell .bs-logo { width: 58px; height: 58px; border-radius: 18px; display: grid; place-items: center; font: 900 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(135deg, #a855f7, #ec4899); box-shadow: 0 18px 50px rgba(236,72,153,.35); }
      .boot-shell .bs-title { margin: 0 0 4px; font: 900 30px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .boot-shell .bs-sub { margin: 0 0 12px; font: 600 14px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: rgba(255,255,255,.78); }
      .boot-shell .bs-btn { height: 40px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font: 800 14px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; box-shadow: 0 12px 34px rgba(0,0,0,.22); }
      .boot-shell .bs-btn.primary { background: linear-gradient(90deg, #9333ea, #d946ef, #ec4899); color: #fff; }
      .boot-shell .bs-btn.phone { background: linear-gradient(90deg, #22c55e, #10b981, #16a34a); color: #fff; }
      .boot-shell .bs-btn.email { background: rgba(255,255,255,.92); color: #111827; }
      .boot-shell .bs-terms { align-self: center; margin-top: 4px; font: 600 11px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: rgba(255,255,255,.78); }

      html[data-boot-theme="dark"] .boot-shell { background: #050208; }

      /* Hide boot shell once React mounts. */
      body.app-booted .boot-shell { display: none !important; }

      html::-webkit-scrollbar, body::-webkit-scrollbar { width: 0; height: 0; display: none; }
      html, body { scrollbar-width: none; -ms-overflow-style: none; }
    </style>
    <script>
      // Pkg504: pick boot theme from URL before any paint.
      // Dark only for true full-screen room routes (live room, party room,
      // go-live, video calls). List/lobby pages stay light.
      (function () {
        try {
          var p = (location.pathname || '/').toLowerCase();
          var dark =
            /^\/live\/[^\/]+/.test(p) ||
            /^\/live-feed(\/|$)/.test(p) ||
            /^\/party\//.test(p) ||
            p === '/go-live' ||
            /^\/call\//.test(p) ||
            /^\/(active-call|incoming-call|outgoing-call)(\/|$)/.test(p) ||
            /^\/stream\//.test(p);
          if (dark) document.documentElement.setAttribute('data-boot-theme', 'dark');
        } catch (_) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div class="boot-shell" aria-hidden="true">
      <div class="bs-auth">
        <div class="bs-logo">M</div>
        <h1 class="bs-title">meriLIVE</h1>
        <p class="bs-sub">Connect • Chat • Share</p>
        <div class="bs-btn primary">Get Started</div>
        <div class="bs-btn phone">Continue with Phone</div>
        <div class="bs-btn email">Continue with Email</div>
        <div class="bs-terms">I agree to the Terms of Service & Privacy Policy • 18+</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
