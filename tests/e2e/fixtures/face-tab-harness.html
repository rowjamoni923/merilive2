<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Face Verification — Tab & Button Visibility Harness</title>
    <style>
      body { font-family: system-ui, sans-serif; padding: 16px; }
      .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
      .tab { padding: 6px 12px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; background: #f4f4f5; }
      .tab[aria-selected="true"] { background: #6366f1; color: #fff; border-color: #6366f1; }
      .card { border: 1px solid #e4e4e7; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
      .actions { display: flex; gap: 8px; margin-top: 8px; }
      .btn-approve { background: #22c55e; color: white; padding: 6px 10px; border: 0; border-radius: 6px; cursor: pointer; }
      .btn-reject  { background: #ef4444; color: white; padding: 6px 10px; border: 0; border-radius: 6px; cursor: pointer; }
      .badge { display: inline-block; padding: 2px 6px; border-radius: 6px; font-size: 12px; margin-left: 6px; }
      .badge-pending  { background: #fef3c7; color: #92400e; }
      .badge-approved { background: #dcfce7; color: #166534; }
      .badge-rejected { background: #fee2e2; color: #991b1b; }
      .empty { color: #6b7280; padding: 12px; }
    </style>
  </head>
  <body>
    <h1>Admin · Face Verification — Tab/Button Visibility</h1>
    <div class="tabs" role="tablist" aria-label="Face verification status">
      <button class="tab" role="tab" data-tab="pending"  aria-selected="true">Pending</button>
      <button class="tab" role="tab" data-tab="approved" aria-selected="false">Approved</button>
      <button class="tab" role="tab" data-tab="rejected" aria-selected="false">Rejected</button>
      <button class="tab" role="tab" data-tab="all"      aria-selected="false">All</button>
    </div>
    <div id="last-action" data-testid="last-action" aria-live="polite" style="margin:8px 0; min-height:18px; font-weight:600;"></div>
    <div id="action-log" data-testid="action-log" hidden></div>
    <div id="list" data-testid="submissions-list"></div>

    <script>
      // Mirrors src/lib/admin/statusCounts.ts bucketOfStatus exactly. The Vitest
      // regression test (faceTabVisibility.test.ts) guards the canonical version;
      // this copy ensures the E2E DOM contract stays in lock-step.
      function bucketOfStatus(status) {
        const n = String(status || "").trim().toLowerCase();
        if (["approved","auto_approved","auto-approved","auto_verified","auto-verified"].includes(n)) return "approved";
        if (["rejected","auto_rejected","auto-rejected"].includes(n)) return "rejected";
        return "pending";
      }
      const FIXTURES = {
        default: [
          { id: "p1", name: "Pending Alice",    status: "pending" },
          { id: "p2", name: "Submitted Bob",    status: "submitted" },
          { id: "p3", name: "Unknown Carol",    status: "future_unknown" },
          { id: "a1", name: "Approved Dave",    status: "approved" },
          { id: "a2", name: "Auto-Approved Eve",status: "auto_approved" },
          { id: "r1", name: "Rejected Frank",   status: "rejected" },
          { id: "r2", name: "Auto-Rejected Gina",status: "auto_rejected" },
        ],
        // No pending-bucket rows at all.
        empty_pending: [
          { id: "a1", name: "Approved Dave",    status: "approved" },
          { id: "r1", name: "Rejected Frank",   status: "rejected" },
        ],
        // Completely empty dataset.
        empty_all: [],
        // Rows with malformed/edge status flags: null, "", whitespace, mixed case,
        // numeric, unknown — all must safely fall into the pending bucket
        // except mixed-case "APPROVED" which normalizes to approved.
        bad_status: [
          { id: "b1", name: "Null Status",      status: null },
          { id: "b2", name: "Empty Status",     status: "" },
          { id: "b3", name: "Whitespace",       status: "   " },
          { id: "b4", name: "Mixed Case OK",    status: "APPROVED" },
          { id: "b5", name: "Numeric",          status: 42 },
          { id: "b6", name: "Garbage",          status: "wat_is_this" },
        ],
      };

      const params = new URLSearchParams(location.search);
      const fixtureKey = params.get("fixture") || "default";
      const FIXTURE = FIXTURES[fixtureKey] ?? FIXTURES.default;

      function render(tab) {
        const list = document.getElementById("list");
        const visible = FIXTURE.filter(r => {
          const b = bucketOfStatus(r.status);
          if (tab === "all") return true;
          return b === tab;
        });
        list.innerHTML = "";
        if (visible.length === 0) {
          const e = document.createElement("div");
          e.className = "empty";
          e.setAttribute("data-testid", "empty-state");
          e.textContent = "No submissions found";
          list.appendChild(e);
          return;
        }
        for (const sub of visible) {
          const bucket = bucketOfStatus(sub.status);
          const card = document.createElement("div");
          card.className = "card";
          card.setAttribute("data-testid", "submission-card");
          card.setAttribute("data-id", sub.id);
          card.setAttribute("data-bucket", bucket);
          card.setAttribute("data-status", sub.status == null ? "" : String(sub.status));
          card.innerHTML =
            '<strong>' + sub.name + '</strong>' +
            '<span class="badge badge-' + bucket + '">' + bucket + '</span>';
          if (bucket === "pending") {
            const actions = document.createElement("div");
            actions.className = "actions";
            actions.setAttribute("data-testid", "action-buttons");
            actions.innerHTML =
              '<button class="btn-approve" data-testid="approve-btn" data-id="' + sub.id + '">Approve</button>' +
              '<button class="btn-reject"  data-testid="reject-btn"  data-id="' + sub.id + '">Reject</button>';
            card.appendChild(actions);
          }
          list.appendChild(card);
        }
      }

      // Action log so Playwright can introspect what was dispatched.
      window.__ACTIONS__ = [];
      let currentTab = "pending";

      function recordAction(action, id) {
        const row = FIXTURE.find(r => r.id === id);
        const prev = row ? row.status : null;
        const next = action === "approve" ? "approved" : "rejected";
        if (row) row.status = next;
        const entry = { action, id, prev, next, ts: Date.now() };
        window.__ACTIONS__.push(entry);
        const banner = document.getElementById("last-action");
        banner.setAttribute("data-action", action);
        banner.setAttribute("data-id", id);
        banner.setAttribute("data-prev", String(prev ?? ""));
        banner.setAttribute("data-next", next);
        banner.textContent = `${action.toUpperCase()} → ${id} (${prev ?? "∅"} → ${next})`;
        const log = document.getElementById("action-log");
        log.appendChild(Object.assign(document.createElement("div"), {
          className: "log-entry",
          textContent: JSON.stringify(entry),
        }));
      }

      document.getElementById("list").addEventListener("click", (e) => {
        const t = e.target;
        if (!(t instanceof HTMLElement)) return;
        const id = t.getAttribute("data-id");
        if (!id) return;
        if (t.matches('[data-testid="approve-btn"]')) {
          recordAction("approve", id);
          render(currentTab);
        } else if (t.matches('[data-testid="reject-btn"]')) {
          recordAction("reject", id);
          render(currentTab);
        }
      });

      document.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(b => b.setAttribute("aria-selected", "false"));
          btn.setAttribute("aria-selected", "true");
          currentTab = btn.dataset.tab;
          render(currentTab);
        });
      });
      render("pending");
    </script>
  </body>
</html>
