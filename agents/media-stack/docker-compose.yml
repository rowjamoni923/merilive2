## ============================================================
## LiveKit Media Stack — Egress + Ingress + Redis
## Deploy on your VPS (livekit.merilive.xyz host)
## ============================================================
##
## Prereqs on VPS:
##   - Docker + docker-compose installed
##   - LiveKit SFU already running (wss://livekit.merilive.xyz)
##   - Ports open in firewall:
##       1935/tcp     — RTMP ingest (OBS)
##       8080/tcp     — WHIP ingest (low-latency)
##       7885/udp     — WHIP/WebRTC media
##       50000-60000/udp — Egress/Ingress media
##   - DNS A record (optional but recommended):
##       ingress.merilive.xyz → VPS IP
##
## Usage:
##   cp .env.example .env       # fill in your values
##   docker compose up -d
##   docker compose logs -f egress ingress
##
version: "3.9"

services:
  # ---------------------------------------------------------
  # Redis — shared message bus between SFU, Egress, Ingress
  # ---------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: livekit-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - livekit
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------
  # Egress — Room Composite recording + RTMP simulcast
  # Handles Pkg111 (recording) + Pkg114 (YouTube/FB/Twitch push)
  # ---------------------------------------------------------
  egress:
    image: livekit/egress:latest
    container_name: livekit-egress
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    cap_add:
      - CAP_SYS_ADMIN          # required by chromium sandbox
    environment:
      EGRESS_CONFIG_BODY: |
        log_level: info
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ${LIVEKIT_URL}
        redis:
          address: redis:6379
          password: ${REDIS_PASSWORD}
        s3:
          access_key: ${S3_ACCESS_KEY}
          secret: ${S3_SECRET}
          region: ${S3_REGION}
          bucket: ${S3_BUCKET}
          endpoint: ${S3_ENDPOINT}
          force_path_style: true
        insecure: false
        cpu_cost:
          room_composite_cpu_cost: 3.5
          audio_room_composite_cpu_cost: 1
          track_composite_cpu_cost: 2
          track_cpu_cost: 1
    networks:
      - livekit
    # Egress needs broad UDP range for media playback to RTMP destinations
    ports:
      - "50000-50100:50000-50100/udp"

  # ---------------------------------------------------------
  # Ingress — OBS / RTMP / WHIP push-INTO LiveKit room
  # Handles Pkg181a (OBS streaming for pro hosts)
  # ---------------------------------------------------------
  ingress:
    image: livekit/ingress:latest
    container_name: livekit-ingress
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      INGRESS_CONFIG_BODY: |
        log_level: info
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ${LIVEKIT_URL}
        redis:
          address: redis:6379
          password: ${REDIS_PASSWORD}
        rtmp_port: 1935
        whip_port: 8080
        http_relay_port: 9090
        rtc_config:
          udp_port: 7885
          use_external_ip: true
    networks:
      - livekit
    ports:
      - "1935:1935/tcp"       # RTMP ingest (OBS/Streamlabs/FFmpeg)
      - "8080:8080/tcp"       # WHIP ingest (browser/mobile low-latency)
      - "7885:7885/udp"       # WHIP WebRTC media
      - "50101-50200:50101-50200/udp"  # WebRTC media

networks:
  livekit:
    driver: bridge

volumes:
  redis-data:
